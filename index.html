<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云盘资源搜索</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon"></span>
                    <span class="logo-text">云盘搜索</span>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                        <span class="theme-icon"></span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 搜索区域 -->
            <section class="search-section" id="searchSection">
                <div class="search-container">
                    <h1 class="search-title">云盘资源搜索</h1>
                    <p class="search-subtitle">支持夸克网盘、百度网盘、阿里云盘等多平台资源检索</p>
                    
                    <div class="search-box-wrapper">
                        <div class="search-box">
                            <span class="search-icon"></span>
                            <input 
                                type="text" 
                                id="searchInput" 
                                class="search-input" 
                                placeholder="输入关键词搜索资源..."
                                autocomplete="off"
                            >
                            <button class="search-btn" id="searchBtn">
                                <span class="btn-text">搜索</span>
                            </button>
                        </div>
                    </div>

                    <!-- 筛选标签 -->
                    <div class="filter-tags" id="filterTags">
                        <button class="filter-tag active" data-type="all">全部</button>
                        <button class="filter-tag" data-type="quark">夸克网盘</button>
                        <button class="filter-tag" data-type="baidu">百度网盘</button>
                        <button class="filter-tag" data-type="aliyun">阿里云盘</button>
                        <button class="filter-tag" data-type="xunlei">迅雷网盘</button>
                    </div>

                    <!-- 排序选项 -->
                    <div class="sort-options">
                        <button class="sort-btn active" data-sort="latest">最新优先</button>
                        <button class="sort-btn" data-sort="oldest">最早优先</button>
                    </div>

                    <!-- 热门搜索 -->
                    <div class="hot-searches">
                        <span class="hot-label">热门搜索：</span>
                        <div class="hot-tags">
                            <span class="hot-tag" data-keyword="三体">三体</span>
                            <span class="hot-tag" data-keyword="流浪地球">流浪地球</span>
                            <span class="hot-tag" data-keyword="狂飙">狂飙</span>
                            <span class="hot-tag" data-keyword="Python">Python</span>
                            <span class="hot-tag" data-keyword="考研">考研</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 结果区域 -->
            <section class="results-section" id="resultsSection" style="display: none;">
                <div class="results-header">
                    <h2 class="results-title">
                        <span id="resultKeyword"></span> 的搜索结果
                    </h2>
                    <span class="results-count" id="resultCount">共 0 条结果</span>
                </div>

                <!-- 加载状态 -->
                <div class="loading-state" id="loadingState">
                    <div class="loading-spinner">
                        <div class="spinner-ring"></div>
                    </div>
                    <p class="loading-text">正在搜索资源...</p>
                </div>

                <!-- 结果列表 -->
                <div class="results-grid" id="resultsGrid">
                    <!-- 结果卡片将通过JS动态生成 -->
                </div>

                <!-- 空状态 -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon"></div>
                    <p class="empty-text">未找到相关资源</p>
                    <p class="empty-hint">试试其他关键词吧</p>
                </div>

                <!-- 错误状态 -->
                <div class="error-state" id="errorState" style="display: none;">
                    <div class="error-icon"></div>
                    <p class="error-text">搜索出错了</p>
                    <p class="error-hint" id="errorHint">请稍后重试</p>
                    <button class="retry-btn" id="retryBtn">重新搜索</button>
                </div>

                <!-- 加载更多 -->
                <div class="load-more-wrapper" id="loadMoreWrapper" style="display: none;">
                    <button class="load-more-btn" id="loadMoreBtn">
                        <span class="load-more-text">加载更多</span>
                    </button>
                </div>
            </section>
        </main>

        <!-- 返回顶部 -->
        <button class="back-to-top" id="backToTop" style="opacity: 0; visibility: hidden;">
            <span class="back-icon"></span>
        </button>

        <!-- 底部 -->
        <footer class="footer">
            <p>数据来源：泽索搜 Zreso API</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
